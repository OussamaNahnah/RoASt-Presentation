<section data-slide-id="algorithm-def">
  <div class="slide-header">
    <div class="slide-title">3 – Algorithm</div>
    <div class="slide-subtitle">A) Definition</div>
  </div>
  <div class="slide-body">
    <ul>
      <li>An algorithm is a collection of rules.</li>
      <li>The rules provide a unique direction regardless of the transmitted view
          (<em>well-defined</em> property).</li>
    </ul>
    <div class="two-col" style="margin-top:12px; align-items:center;">

      <!-- Left: rules table (always visible) -->
      <div class="fig">
        <!-- ── SVG: rule table ───────────────────────────────── -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="290"
             aria-label="Algorithm rules table: view maps to color action">
          <!-- Header -->
          <rect x="0"   y="0"   width="240" height="28" rx="4" fill="#006D82"/>
          <text x="60"  y="18"  text-anchor="middle" font-size="11" fill="white" font-weight="bold">View</text>
          <text x="155" y="18"  text-anchor="middle" font-size="11" fill="white" font-weight="bold">New color</text>
          <line x1="115" y1="0" x2="115" y2="200" stroke="#006D82" stroke-width="1"/>
          <!-- Row 1 -->
          <rect x="0"   y="28"  width="240" height="34" fill="#f0f8ff"/>
          <circle cx="40" cy="45"  r="9" fill="#00cc66"/><circle cx="60" cy="45"  r="9" fill="#e0e0e0"/><circle cx="80" cy="45" r="9" fill="#e0e0e0"/>
          <text x="60" y="45" text-anchor="middle" font-size="8" fill="#666">…</text>
          <circle cx="160" cy="45" r="9" fill="#FFD700"/>
          <text x="190" y="49" font-size="11" fill="#555">→ yellow</text>
          <!-- Row 2 -->
          <rect x="0"   y="62"  width="240" height="34" fill="#ffffff"/>
          <circle cx="40" cy="79"  r="9" fill="#FFD700"/><circle cx="60" cy="79"  r="9" fill="#00cc66"/><circle cx="80" cy="79" r="9" fill="#e0e0e0"/>
          <circle cx="160" cy="79" r="9" fill="#ff3366"/>
          <text x="190" y="83" font-size="11" fill="#555">→ red</text>
          <!-- Row 3 -->
          <rect x="0"   y="96"  width="240" height="34" fill="#f0f8ff"/>
          <circle cx="40" cy="113" r="9" fill="#ff3366"/><circle cx="60" cy="113" r="9" fill="#ff3366"/><circle cx="80" cy="113" r="9" fill="#e0e0e0"/>
          <circle cx="160" cy="113" r="9" fill="#00ccff"/>
          <text x="190" y="117" font-size="11" fill="#555">→ blue</text>
          <!-- Row 4 -->
          <rect x="0"   y="130" width="240" height="34" fill="#ffffff"/>
          <circle cx="40" cy="147" r="9" fill="#00ccff"/><circle cx="60" cy="147" r="9" fill="#e0e0e0"/><circle cx="80" cy="147" r="9" fill="#00ccff"/>
          <circle cx="160" cy="147" r="9" fill="#00cc66"/>
          <text x="190" y="151" font-size="11" fill="#555">→ green</text>
          <!-- More -->
          <text x="120" y="190" text-anchor="middle" font-size="13" fill="#8C979A">⋯</text>
        </svg>
        <figcaption>Rule table</figcaption>
      </div>

      <!-- Right: execution state (swaps on fragment) -->
      <div class="fig">
        <div class="r-stack">

          <!-- Execution state 1 -->
          <svg class="fragment fade-out" data-fragment-index="0"
               xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="260"
               aria-label="Rule execution – initial state">
            <!-- 3 robots in a row, different colors -->
            <!-- Robot A (green) -->
            <rect x="20"  y="40" width="36" height="46" rx="6" fill="#006D82"/>
            <rect x="24"  y="24" width="28" height="22" rx="5" fill="#006D82"/>
            <circle cx="31" cy="35" r="6" fill="#00cc66"/>
            <circle cx="45" cy="35" r="6" fill="#00cc66"/>
            <text x="38" y="88" text-anchor="middle" font-size="9" fill="white">A</text>
            <!-- Robot B (yellow – central) -->
            <rect x="82"  y="40" width="36" height="46" rx="6" fill="#006D82"/>
            <rect x="86"  y="24" width="28" height="22" rx="5" fill="#006D82"/>
            <circle cx="93" cy="35" r="6" fill="#FFD700"/>
            <circle cx="107" cy="35" r="6" fill="#FFD700"/>
            <text x="100" y="88" text-anchor="middle" font-size="9" fill="white">B</text>
            <!-- Robot C (red) -->
            <rect x="144" y="40" width="36" height="46" rx="6" fill="#006D82"/>
            <rect x="148" y="24" width="28" height="22" rx="5" fill="#006D82"/>
            <circle cx="155" cy="35" r="6" fill="#ff3366"/>
            <circle cx="169" cy="35" r="6" fill="#ff3366"/>
            <text x="162" y="88" text-anchor="middle" font-size="9" fill="white">C</text>
            <!-- Arrows (B looks at A and C) -->
            <line x1="80"  y1="60" x2="60"  y2="60" stroke="#FFD700" stroke-width="2" stroke-dasharray="4,2"/>
            <line x1="120" y1="60" x2="140" y2="60" stroke="#FFD700" stroke-width="2" stroke-dasharray="4,2"/>
            <polygon points="60,56 52,60 60,64" fill="#FFD700"/>
            <polygon points="140,56 148,60 140,64" fill="#FFD700"/>
            <!-- State label -->
            <text x="100" y="115" text-anchor="middle" font-size="11" fill="#8C979A" font-style="italic">B looks: sees green + red</text>
            <text x="100" y="130" text-anchor="middle" font-size="11" fill="#8C979A" font-style="italic">→ rule fires: B turns blue</text>
          </svg>

          <!-- Execution state 2 -->
          <svg class="fragment" data-fragment-index="0"
               xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="260"
               aria-label="Rule execution – after rule fires">
            <!-- Robot A (green) -->
            <rect x="20"  y="40" width="36" height="46" rx="6" fill="#006D82"/>
            <rect x="24"  y="24" width="28" height="22" rx="5" fill="#006D82"/>
            <circle cx="31" cy="35" r="6" fill="#00cc66"/>
            <circle cx="45" cy="35" r="6" fill="#00cc66"/>
            <text x="38" y="88" text-anchor="middle" font-size="9" fill="white">A</text>
            <!-- Robot B now BLUE -->
            <rect x="82"  y="40" width="36" height="46" rx="6" fill="#006D82"/>
            <rect x="86"  y="24" width="28" height="22" rx="5" fill="#006D82"/>
            <circle cx="93" cy="35" r="6" fill="#00ccff"/>
            <circle cx="107" cy="35" r="6" fill="#00ccff"/>
            <text x="100" y="88" text-anchor="middle" font-size="9" fill="white">B</text>
            <!-- Change indicator -->
            <text x="100" y="10" text-anchor="middle" font-size="10" fill="#006D82" font-weight="bold">✓ Rule applied</text>
            <!-- Robot C (red) -->
            <rect x="144" y="40" width="36" height="46" rx="6" fill="#006D82"/>
            <rect x="148" y="24" width="28" height="22" rx="5" fill="#006D82"/>
            <circle cx="155" cy="35" r="6" fill="#ff3366"/>
            <circle cx="169" cy="35" r="6" fill="#ff3366"/>
            <text x="162" y="88" text-anchor="middle" font-size="9" fill="white">C</text>
            <!-- Move arrow for B -->
            <line x1="118" y1="68" x2="138" y2="68" stroke="#00ccff" stroke-width="2.5"/>
            <polygon points="136,63 144,68 136,73" fill="#00ccff"/>
            <text x="100" y="115" text-anchor="middle" font-size="11" fill="#8C979A" font-style="italic">B is now blue, moves right</text>
          </svg>

        </div>
        <figcaption>Rule execution</figcaption>
      </div>

    </div>
  </div>
</section>

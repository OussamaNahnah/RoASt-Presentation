<section data-slide-id="obj-3d">
  <div class="slide-header">
    <div class="slide-title">4 – Objective</div>
    <div class="slide-subtitle">A) 3D Environments</div>
  </div>
  <div class="slide-body">
    <ul>
      <li>The human body, airspace, seas…</li>
    </ul>
    <div class="fig" style="margin-top:10px;">
      <!-- ── SVG: isometric 3D grid ────────────────────────── -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260" width="480"
           aria-label="3D isometric grid showing robots at different heights">

        <!-- Helper: isometric projection
             Iso-x = (col - row) * 44
             Iso-y = (col + row) * 22 - layer * 60
             Origin centered at (190, 200) -->

        <!-- Layer 0 (bottom) — 3×3 grid -->
        <!-- Horizontal edges layer 0 -->
        <!-- row=0: col 0→1→2 -->
        <line x1="146" y1="200" x2="190" y2="178" stroke="#8C979A" stroke-width="1.5"/>
        <line x1="190" y1="178" x2="234" y2="156" stroke="#8C979A" stroke-width="1.5"/>
        <!-- row=1: col 0→1→2 -->
        <line x1="102" y1="222" x2="146" y2="200" stroke="#8C979A" stroke-width="1.5"/>
        <line x1="146" y1="200" x2="190" y2="178" stroke="#8C979A" stroke-width="1.5"/>
        <!-- row=2: col 0→1→2 -->
        <line x1="58"  y1="244" x2="102" y2="222" stroke="#8C979A" stroke-width="1.5"/>
        <line x1="102" y1="222" x2="146" y2="200" stroke="#8C979A" stroke-width="1.5"/>

        <!-- Depth edges layer 0 -->
        <!-- col=0: row 0→1→2 -->
        <line x1="146" y1="200" x2="102" y2="222" stroke="#8C979A" stroke-width="1.5"/>
        <line x1="102" y1="222" x2="58"  y2="244" stroke="#8C979A" stroke-width="1.5"/>
        <!-- col=1 -->
        <line x1="190" y1="178" x2="146" y2="200" stroke="#8C979A" stroke-width="1.5"/>
        <line x1="146" y1="200" x2="102" y2="222" stroke="#8C979A" stroke-width="1.5"/>
        <!-- col=2 -->
        <line x1="234" y1="156" x2="190" y2="178" stroke="#8C979A" stroke-width="1.5"/>
        <line x1="190" y1="178" x2="146" y2="200" stroke="#8C979A" stroke-width="1.5"/>

        <!-- Vertical edges (layer 0 to layer 1) at some nodes -->
        <line x1="146" y1="200" x2="146" y2="140" stroke="#006D82" stroke-width="1.5" opacity="0.5"/>
        <line x1="190" y1="178" x2="190" y2="118" stroke="#006D82" stroke-width="1.5" opacity="0.5"/>
        <line x1="102" y1="222" x2="102" y2="162" stroke="#006D82" stroke-width="1.5" opacity="0.5"/>

        <!-- Layer 1 (top) — partial 3×3 grid -->
        <line x1="146" y1="140" x2="190" y2="118" stroke="#006D82" stroke-width="1.5" opacity="0.7"/>
        <line x1="102" y1="162" x2="146" y2="140" stroke="#006D82" stroke-width="1.5" opacity="0.7"/>
        <line x1="146" y1="140" x2="102" y2="162" stroke="#006D82" stroke-width="1.5" opacity="0.7"/>
        <line x1="190" y1="118" x2="146" y2="140" stroke="#006D82" stroke-width="1.5" opacity="0.7"/>

        <!-- Layer 2 (top of top) — single vertical -->
        <line x1="190" y1="118" x2="190" y2="58" stroke="#006D82" stroke-width="1.5" opacity="0.4"/>
        <line x1="146" y1="140" x2="146" y2="80" stroke="#006D82" stroke-width="1.5" opacity="0.4"/>

        <!-- Nodes layer 0 (gray) -->
        <circle cx="146" cy="200" r="8" fill="#8C979A"/>
        <circle cx="190" cy="178" r="8" fill="#8C979A"/>
        <circle cx="234" cy="156" r="8" fill="#8C979A"/>
        <circle cx="102" cy="222" r="8" fill="#8C979A"/>
        <circle cx="58"  cy="244" r="8" fill="#8C979A"/>

        <!-- Nodes layer 1 (teal) — robots at this level -->
        <circle cx="146" cy="140" r="9" fill="#006D82"/>
        <circle cx="190" cy="118" r="9" fill="#006D82"/>
        <circle cx="102" cy="162" r="9" fill="#006D82"/>
        <!-- Robot markers -->
        <circle cx="190" cy="118" r="5" fill="#FFD700"/>
        <circle cx="146" cy="140" r="5" fill="#ff6633"/>

        <!-- Nodes layer 2 (lighter) -->
        <circle cx="190" cy="58" r="8" fill="#006D82" opacity="0.5"/>
        <circle cx="146" cy="80" r="8" fill="#006D82" opacity="0.5"/>

        <!-- Axis labels -->
        <text x="340" y="158" font-size="12" fill="#006D82" font-style="italic">x</text>
        <text x="30"  y="240" font-size="12" fill="#006D82" font-style="italic">y</text>
        <text x="192" y="50"  font-size="12" fill="#006D82" font-style="italic">z</text>

      </svg>
      <!-- ───────────────────────────────────────────────────── -->
      <figcaption>3D environment</figcaption>
    </div>
  </div>
</section>
